name: forms-flow-integration-CI

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
      - main-rsbc
      - develop
    paths:
      - "forms-flow-integration/**"

jobs:
  ci:
    uses: ./.github/workflows/ci-workflow.yml
    with:
      working_directory: ./forms-flow-integration
      node_version: '20.x'
      enable_lint: false
      enable_test: false
      enable_build: true

